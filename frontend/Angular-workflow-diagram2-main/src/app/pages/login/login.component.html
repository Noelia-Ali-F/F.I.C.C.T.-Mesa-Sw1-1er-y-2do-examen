<div class="login-wrapper">
  <div class="login-background">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
  </div>

  <div class="wf-card login-card animate-fade-in">
    <div class="login-header">
      <div class="login-brand">
        <div class="brand-mark">WF</div>
        <div class="brand-text">
          <span class="name">WORKFLOW</span>
          <span class="tag">PREMIUM CORE</span>
        </div>
      </div>
      <h2 class="login-title">Bienvenido de nuevo</h2>
      <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema corporativo.</p>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault()" class="login-form">
      <div class="form-group">
        <label>Usuario</label>
        <div class="input-wrapper">
          <mat-icon fontSet="material-symbols-rounded">person</mat-icon>
          <input type="text" [formField]="loginForm.username" placeholder="Nombre de usuario" />
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="input-wrapper">
          <mat-icon fontSet="material-symbols-rounded">lock</mat-icon>
          <input type="password" [formField]="loginForm.password" placeholder="••••••••" />
        </div>
      </div>

      @if (errorMsg) {
        <div class="error-alert">
          <mat-icon fontSet="material-symbols-rounded">error_outline</mat-icon>
          <span>{{ errorMsg }}</span>
        </div>
      }

      <button type="submit" [disabled]="loginForm().invalid() || isSubmitting" class="login-submit-btn">
        @if(isSubmitting) {
          <div class="spinner-small"></div>
          <span>Iniciando sesión...</span>
        } @else {
          <span>Entrar al Sistema</span>
          <mat-icon fontSet="material-symbols-rounded">arrow_forward</mat-icon>
        }
      </button>
    </form>

    <div class="login-footer">
      <p>&copy; 2026 Workflow Corporativo. Todos los derechos reservados.</p>
    </div>
  </div>
</div>
